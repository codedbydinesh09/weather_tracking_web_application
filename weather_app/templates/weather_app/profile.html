{% extends "weather_app/base.html" %}
{% load static %}

{% block extra_head %}
<style>
    .profile-layout {
        max-width: 600px;
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
    }
    .profile-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
        margin: 0 auto 16px;
    }
</style>
{% endblock %}

{% block content %}
<div class="profile-layout">
    <div class="glass-card" style="padding: 40px;">
        <div class="profile-avatar" id="avatarInitial">{{ user.username|make_list|first|upper }}</div>
        <h2 style="text-align: center; margin-bottom: 8px;">Profile Settings</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 32px;">Update your personal details below.</p>
        
        <form id="profileForm" onsubmit="updateProfile(event)">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">Username</label>
                <input type="text" id="username" class="glass-input" value="{{ user.username }}" required>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">Email Address</label>
                <input type="email" id="email" class="glass-input" value="{{ user.email }}" required>
            </div>
            
            <div style="margin-bottom: 32px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">New Password (leave blank to keep current)</label>
                <input type="password" id="password" class="glass-input" placeholder="Enter new password...">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;" id="saveBtn">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function updateProfile(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('saveBtn');

        if (!confirm('Are you sure you want to update your profile details?')) return;

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

        fetch('/profile/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({ username, email, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast(data.message, 'success');
                if (password) document.getElementById('password').value = '';
                document.getElementById('avatarInitial').textContent = username.charAt(0).toUpperCase();
            } else {
                showToast(data.error || 'Failed to update profile', 'error');
            }
        })
        .catch(err => {
            showToast('An error occurred.', 'error');
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
        });
    }
</script>
{% endblock %}
