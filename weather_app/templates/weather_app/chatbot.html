{% extends "weather_app/base.html" %}
{% load static %}

{% block extra_head %}
<style>
    .chat-layout {
        display: flex;
        gap: 24px;
        height: calc(100vh - 120px);
        max-width: 1200px;
        margin: 0 auto;
    }

    .chat-sidebar {
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        flex-shrink: 0;
    }

    .new-chat-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .history-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        flex: 1;
    }

    .history-item {
        padding: 16px;
        background: rgba(255,255,255,0.4);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .history-item:hover {
        background: rgba(255,255,255,0.8);
        transform: translateY(-2px);
    }

    .history-item.active {
        background: var(--glass-bg);
        border-color: var(--accent-blue);
        box-shadow: var(--shadow-soft);
    }

    .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    .message {
        display: flex;
        gap: 16px;
        max-width: 80%;
    }

    .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
    }

    .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1.2rem;
    }

    .message.bot .avatar {
        background: rgba(56, 189, 248, 0.15);
        color: var(--accent-blue);
    }

    .message.user .avatar {
        background: rgba(167, 139, 250, 0.15);
        color: var(--accent-purple);
    }

    .bubble {
        padding: 16px 20px;
        border-radius: 20px;
        line-height: 1.5;
        font-size: 1rem;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .message.bot .bubble {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-top-left-radius: 4px;
        color: var(--text-primary);
    }

    .message.user .bubble {
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        color: white;
        border-top-right-radius: 4px;
    }

    .chat-input-area {
        padding: 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--glass-border);
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        position: relative;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    #userInput {
        flex: 1;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(56, 189, 248, 0.3);
        padding: 16px 20px;
        padding-right: 120px;
        border-radius: var(--radius-full);
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
        color: #f8fafc;
        outline: none;
        transition: all 0.2s;
        box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
    }

    #userInput::placeholder {
        color: #94a3b8;
    }

    #userInput:focus {
        background: rgba(15, 23, 42, 0.9);
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15), inset 0 2px 6px rgba(0,0,0,0.2);
    }

    .char-counter {
        position: absolute;
        right: 70px;
        font-size: 0.8rem;
        color: var(--text-secondary);
    }

    .send-btn {
        position: absolute;
        right: 8px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--accent-blue);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
    }

    .send-btn:hover {
        transform: scale(1.05);
    }

    .send-btn:disabled {
        background: var(--text-secondary);
        cursor: not-allowed;
    }

    .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 8px 12px;
    }

    .typing-dot {
        width: 8px;
        height: 8px;
        background: var(--text-secondary);
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }

    @media (max-width: 768px) {
        .chat-layout { flex-direction: column; }
        .chat-sidebar { width: 100%; height: 200px; }
    }
</style>
{% endblock %}

{% block content %}
<div style="text-align: center; margin-bottom: 24px;">
    <p style="color: var(--text-secondary);">Your intelligent assistant for global and city-specific weather queries.</p>
</div>

<div class="chat-layout">
    
    <!-- Sidebar -->
    <div class="glass-card chat-sidebar">
        <button class="btn-primary new-chat-btn" onclick="newSession()">
            <i class="fa-solid fa-plus"></i> New Chat
        </button>
        <div style="font-weight: 600; color: var(--text-secondary); padding: 0 8px; margin-top: 8px;">Recent Chats</div>
        <div class="history-list" id="historyList">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="glass-card chat-main">
        <div class="chat-messages" id="chatBox">
            <!-- Messages go here -->
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask a weather question...">
                <span class="char-counter" id="charCount">500</span>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const charCount = document.getElementById('charCount');
    const historyList = document.getElementById('historyList');

    const MAX_CHARS = 500;
    let currentSessionId = null;
    let isSending = false;

    // Load Welcome
    function newSession() {
        currentSessionId = null;
        chatBox.innerHTML = `
            <div class="message bot">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble">
                    Hello! I'm <strong>Weather AI</strong>. Ask me about current conditions, forecasts, climate trends, or weather along a route. How can I help you today?
                </div>
            </div>
        `;
        fetchHistory();
    }

    async function fetchHistory() {
        try {
            const res = await fetch('/api/chat-sessions/');
            const data = await res.json();
            historyList.innerHTML = '';
            
            data.sessions.forEach(session => {
                const div = document.createElement('div');
                div.className = `history-item ${session.id === currentSessionId ? 'active' : ''}`;
                div.innerHTML = `
                    <div style="font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(session.title)}</div>
                    <div style="font-size: 0.8rem; color: var(--text-secondary);">${session.created_at}</div>
                `;
                div.onclick = () => loadSession(session.id);
                historyList.appendChild(div);
            });
        } catch (e) {
            console.error('History fetch failed', e);
        }
    }

    async function loadSession(id) {
        try {
            const res = await fetch(`/api/chat-sessions/${id}/`);
            const data = await res.json();
            currentSessionId = id;
            chatBox.innerHTML = '';
            
            data.messages.forEach(msg => {
                appendMessage(msg.role, msg.content, false);
            });
            fetchHistory();
        } catch (e) {
            console.error('Session load failed', e);
        }
    }

    function appendMessage(role, text, scrollToBottom = true) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        const avatarIcon = role === 'bot' ? 'fa-robot' : 'fa-user';
        
        msgDiv.innerHTML = `
            <div class="avatar"><i class="fa-solid ${avatarIcon}"></i></div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        chatBox.appendChild(msgDiv);
        if (scrollToBottom) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.id = 'typingIndicator';
        div.innerHTML = `
            <div class="avatar"><i class="fa-solid fa-robot"></i></div>
            <div class="bubble" style="padding: 12px 20px;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || isSending) return;

        appendMessage('user', text);
        userInput.value = '';
        updateCharCount();
        showTyping();
        isSending = true;
        sendBtn.disabled = true;

        try {
            const res = await fetch('/api/chatbot/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.getElementById('csrfToken').value
                },
                body: JSON.stringify({ message: text, session_id: currentSessionId })
            });
            const data = await res.json();
            
            hideTyping();
            
            if (res.ok) {
                appendMessage('bot', data.reply);
                if (!currentSessionId) {
                    currentSessionId = data.session_id;
                    fetchHistory();
                }
            } else {
                appendMessage('bot', `Error: ${data.error || 'Failed to get response.'}`);
            }

        } catch (e) {
            hideTyping();
            appendMessage('bot', 'Network error. Please try again.');
        } finally {
            isSending = false;
            updateCharCount();
        }
    }

    function updateCharCount() {
        const len = userInput.value.length;
        charCount.innerText = MAX_CHARS - len;
        sendBtn.disabled = len === 0 || len > MAX_CHARS || isSending;
    }

    userInput.addEventListener('input', updateCharCount);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    // Init
    newSession();
</script>
{% endblock %}
