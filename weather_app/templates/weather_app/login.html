<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherPro - Login</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'weather_app/style.css' %}?v=5">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .auth-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .error-msg {
            color: var(--accent-coral);
            background: #052659;
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .auth-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glass-card auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-cloud-sun-rain" style="color: var(--accent-blue);"></i>
            WeatherPro
        </div>
        <div class="auth-subtitle">Welcome back! Please login to your account.</div>

        {% if error %}
        <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="glass-input" placeholder="Enter your email..." required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="glass-input" placeholder="Enter your password..." required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 12px;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div style="margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="{% url 'register' %}" class="auth-link">Create one</a>
        </div>
    </div>
</body>
</html>
